<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Pond | Midnight</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>

    <div id="auth-page">
        <div class="auth-card">
            <div class="logo">🦆</div>
            <h1>The Duck Pond</h1>
            <div id="login-form">
                <input type="text" id="login-user" placeholder="Username">
                <input type="password" id="login-pass" placeholder="Password">
                <button class="btn-primary" onclick="app.login()">Sign In</button>
                <p class="toggle-link" onclick="ui.toggleAuth()">Create an account</p>
            </div>
            <div id="signup-form" style="display: none;">
                <input type="text" id="reg-user" placeholder="Choose Username">
                <input type="password" id="reg-pass1" placeholder="Password">
                <input type="password" id="reg-pass2" placeholder="Repeat Password">
                <button class="btn-primary" onclick="app.signUp()">Join the Pond</button>
                <p class="toggle-link" onclick="ui.toggleAuth()">Back to login</p>
            </div>
        </div>
    </div>

    <div id="main-interface" style="display:none;">
        <div class="app-shell">
            <nav id="sidebar">
                <div class="sidebar-top">
                    <div class="brand">DUCKCHAT<span>.VER</span><span> 1.6</span></div>
                </div>
                <div id="code-nav"></div>
                <div class="sidebar-bottom">
                    <button class="nav-item" onclick="ui.openModal('create-modal')"><span>+</span> New Room</button>
                    <button class="nav-item" onclick="ui.openSettings()"><span>⚙️</span> Settings</button>
                    <button class="nav-item logout" onclick="app.logout()">Logout</button>
                </div>
            </nav>

            <main id="viewport">
                <header>
                    <h2 id="code-title"># General</h2>
                    <span id="user-display"></span>
                </header>
                <div id="chat-box"></div>
                <div class="input-area">
                    <div class="input-glass">
                        <input type="text" id="msg-input" placeholder="Message the pond..." onkeypress="if(event.key==='Enter') app.send()">
                        <button class="send-btn" onclick="app.send()">Post</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="view-profile-page" class="modal-overlay">
        <div class="profile-card">
            <button class="close-btn" onclick="ui.closeModal('view-profile-page')">✕</button>
            <div class="profile-header">
                <img id="view-pfp" src="UserDefaultProfileBlue.jpg">
                <h1 id="view-username"></h1>
            </div>
            <div class="profile-body">
                <label>BIOGRAPHY</label>
                <p id="view-bio"></p>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-glass">
            <h2>Edit Profile</h2>
            <div class="field">
                <label>Avatar URL</label>
                <input type="text" id="set-pfp-url" placeholder="Paste image link here">
            </div>
            <div class="field">
                <label>About Me</label>
                <textarea id="set-bio" placeholder="Tell us about yourself..."></textarea>
            </div>
            <button class="btn-primary" onclick="app.updateProfile()">Update Profile</button>
            <button class="btn-ghost" onclick="ui.closeModal('settings-modal')">Cancel</button>
        </div>
    </div>

    <div id="create-modal" class="modal-overlay">
        <div class="modal-glass">
            <h2>New Room</h2>
            <input type="text" id="new-room-input" placeholder="ROOM-NAME">
            <button class="btn-primary" onclick="app.createRoom()">Create Room</button>
            <button class="btn-ghost" onclick="ui.closeModal('create-modal')">Cancel</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
